permissions:
    contents: read
name: PR Validation

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]
        paths-ignore:
            - "**.md"

jobs:
    validate:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]
                node-version: [20, 22]

        steps:
            - name: Checkout repo
              uses: actions/checkout@v3

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run validation suite
              run: npm run validate
